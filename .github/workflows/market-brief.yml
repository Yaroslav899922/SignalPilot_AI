name: SignalPilot Market Brief

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '0 9 * * *'   # Ранковий контроль
    - cron: '0 14 * * *'  # Денний контроль

jobs:
  market-brief:
    if: github.event_name != 'push' || contains(github.event.head_commit.message, '[send-brief]')
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install SignalPilot
        run: python -m pip install -e .

      - name: Send market brief
        run: python -m signalpilot --brief --notify --symbols BTCUSDT ETHUSDT SOLUSDT
