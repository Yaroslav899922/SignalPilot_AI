name: SignalPilot Market Brief

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "What to run"
        required: true
        default: "brief"
        type: choice
        options:
          - brief
          - move-alert
      brief_session_key:
        description: "Brief session label"
        required: false
        default: "post-change-test"
        type: choice
        options:
          - post-change-test
          - market
          - asia-open
          - asia-close
          - london-open
          - london-close
          - new-york-open
          - new-york-close
  schedule:
    - cron: '7 0 * * *'   # 03:07 Київ · Азія · open +1h
    - cron: '7 8 * * *'   # 11:07 Київ · Азія · close -1h
    - cron: '7 9 * * *'   # 12:07 Київ · Лондон · open +1h
    - cron: '7 16 * * *'  # 19:07 Київ · Лондон · close -1h
    - cron: '7 14 * * *'  # 17:07 Київ · Нью-Йорк · open +1h
    - cron: '7 21 * * *'  # 00:07 Київ · Нью-Йорк · close -1h
    - cron: '5,20,35,50 0-21,23 * * *'  # Move alerts during session windows, Kyiv summer time

jobs:
  market-brief:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      EVENT_NAME: ${{ github.event_name }}
      EVENT_SCHEDULE: ${{ github.event.schedule }}
      DISPATCH_MODE: ${{ inputs.mode }}
      DISPATCH_BRIEF_SESSION_KEY: ${{ inputs.brief_session_key }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install SignalPilot
        run: python -m pip install -e .

      - name: Resolve run mode
        id: run_mode
        shell: bash
        run: |
          mode="${DISPATCH_MODE:-brief}"
          brief_session="Ринковий контроль"

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            case "${DISPATCH_BRIEF_SESSION_KEY:-post-change-test}" in
              "post-change-test")
                brief_session="Тест після правок"
                ;;
              "market")
                brief_session="Ринковий контроль"
                ;;
              "asia-open")
                brief_session="Азія · open +1h"
                ;;
              "asia-close")
                brief_session="Азія · close -1h"
                ;;
              "london-open")
                brief_session="Лондон · open +1h"
                ;;
              "london-close")
                brief_session="Лондон · close -1h"
                ;;
              "new-york-open")
                brief_session="Нью-Йорк · open +1h"
                ;;
              "new-york-close")
                brief_session="Нью-Йорк · close -1h"
                ;;
            esac
          fi

          if [[ "$EVENT_NAME" == "schedule" ]]; then
            case "$EVENT_SCHEDULE" in
              "7 0 * * *")
                mode="brief"
                brief_session="Азія · open +1h"
                ;;
              "7 8 * * *")
                mode="brief"
                brief_session="Азія · close -1h"
                ;;
              "7 9 * * *")
                mode="brief"
                brief_session="Лондон · open +1h"
                ;;
              "7 16 * * *")
                mode="brief"
                brief_session="Лондон · close -1h"
                ;;
              "7 14 * * *")
                mode="brief"
                brief_session="Нью-Йорк · open +1h"
                ;;
              "7 21 * * *")
                mode="brief"
                brief_session="Нью-Йорк · close -1h"
                ;;
              "5,20,35,50 0-21,23 * * *")
                mode="move-alert"
                ;;
              *)
                mode="brief"
                ;;
            esac
          fi

          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "brief_session=$brief_session" >> "$GITHUB_OUTPUT"

      - name: Send market brief
        if: steps.run_mode.outputs.mode == 'brief'
        run: python -m signalpilot --brief --notify --brief-session "${{ steps.run_mode.outputs.brief_session }}" --symbols BTCUSDT ETHUSDT SOLUSDT

      - name: Send move alert
        if: steps.run_mode.outputs.mode == 'move-alert'
        run: python -m signalpilot --move-alert --notify --move-threshold-pct 1.5 --symbols BTCUSDT ETHUSDT SOLUSDT
