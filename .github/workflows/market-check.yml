name: SignalPilot Market Check

on:
  workflow_dispatch:
    inputs:
      chat_id:
        description: "Telegram chat id that requested the market check"
        required: true

jobs:
  market-check:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ github.event.inputs.chat_id }}
      SIGNALPILOT_JOURNAL_BACKEND: apps_script
      SIGNALPILOT_JOURNAL_API_URL: ${{ secrets.SIGNALPILOT_JOURNAL_API_URL }}
      SIGNALPILOT_JOURNAL_API_TOKEN: ${{ secrets.SIGNALPILOT_JOURNAL_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install SignalPilot
        run: python -m pip install -e .

      - name: Check market and reply in Telegram
        run: python -m signalpilot --symbols BTCUSDT ETHUSDT SOLUSDT --notify

      - name: Evaluate older directional signals
        run: python -m signalpilot --evaluate --lookahead-candles 6

      - name: Print journal report
        run: python -m signalpilot --report
