name: SignalPilot Live Paper Test

on:
  workflow_dispatch:

jobs:
  live-paper-test:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      # Leave SIGNALPILOT_JOURNAL_BACKEND unset to use sqlite (default).
      # Set it to "apps_script" in GitHub Secrets only after Apps Script is deployed.
      SIGNALPILOT_JOURNAL_BACKEND: ${{ secrets.SIGNALPILOT_JOURNAL_BACKEND }}
      SIGNALPILOT_JOURNAL_API_URL: ${{ secrets.SIGNALPILOT_JOURNAL_API_URL }}
      SIGNALPILOT_JOURNAL_API_TOKEN: ${{ secrets.SIGNALPILOT_JOURNAL_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install SignalPilot
        run: python -m pip install -e .

      - name: Generate live paper signals
        run: python -m signalpilot --live-analyst --symbols BTCUSDT ETHUSDT SOLUSDT --notify --notify-no-trade

      - name: Evaluate older directional signals
        run: python -m signalpilot --evaluate --lookahead-candles 12

      - name: Print journal report
        run: python -m signalpilot --report
